# Site Settings
title: "Sunan Zou"
description: "Sunan Zou's Personal Page"
repository: "suenar/suenar.github.io"
google_scholar_stats_use_cdn: true

# google analytics
google_analytics_id: # get google_analytics_id from https://analytics.google.com/analytics/

# SEO Related
google_site_verification:
bing_site_verification:
baidu_site_verification:

# Site Author
author:
  name: "Sunan Zou"
  avatar: "images/profile.jpg"
  bio: "PhD Student in Computer Science at Peking University"
  location: "Beijing, China"
  employer: "Peking University"
  pubmed:
  googlescholar: "https://scholar.google.com/citations?user=-31YAP4AAAAJ&hl=en&oi=ao"
  email: "zousunan@pku.edu.cn"
  researchgate:
  uri: "https://suenar.github.io"
  bitbucket:
  codepen:
  dribbble:
  flickr:
  facebook:
  foursquare:
  github: "suenar"
  google_plus:
  keybase:
  instagram:
  impactstory:
  lastfm:
  linkedin: "sunanzou"
  dblp:
  orcid: "https://orcid.org/0000-0003-0949-4222"
  pinterest:
  soundcloud:
  stackoverflow:
  steam:
  tumblr:
  twitter:
  vine:
  weibo:
  xing:
  youtube:
  wikipedia:


# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - docs
  - google_scholar_crawler
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - .github
  - CHANGELOG
  - Capfile
  - Gemfile
  - Gruntfile.js
  - LICENSE
  - README
  - Rakefile
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - config
  - gulpfile.js
  - log
  - node_modules
  - package.json
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"


# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false


# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Defaults
defaults:
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: default
      author_profile: true


# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed


# Outputting
permalink: /:categories/:title/
timezone: Asia/Shanghai


# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji


# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
